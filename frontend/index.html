<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>技术文档研读助手</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-send" viewBox="0 0 24 24">
        <path d="M3.4 20.2 21 12 3.4 3.8l2.1 6.4 8.9 1.8-8.9 1.8-2.1 6.4Z" />
      </symbol>
      <symbol id="icon-plus" viewBox="0 0 24 24">
        <path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z" />
      </symbol>
      <symbol id="icon-refresh" viewBox="0 0 24 24">
        <path d="M20 6v5h-5l1.9-1.9A6.8 6.8 0 0 0 5.2 12H3.1a8.9 8.9 0 0 1 15.3-6.2L20 4.2V6Zm-1.2 6h2.1A8.9 8.9 0 0 1 5.6 18.2L4 19.8V13h5l-1.9 1.9A6.8 6.8 0 0 0 18.8 12Z" />
      </symbol>
      <symbol id="icon-copy" viewBox="0 0 24 24">
        <path d="M8 7h10v13H8V7Zm2 2v9h6V9h-6ZM5 4h10v2H7v9H5V4Z" />
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="m9.2 16.2-4-4 1.4-1.4 2.6 2.6 8.2-8.2 1.4 1.4-9.6 9.6Z" />
      </symbol>
      <symbol id="icon-x" viewBox="0 0 24 24">
        <path d="m6.4 5 5.6 5.6L17.6 5 19 6.4 13.4 12 19 17.6 17.6 19 12 13.4 6.4 19 5 17.6l5.6-5.6L5 6.4 6.4 5Z" />
      </symbol>
      <symbol id="icon-tool" viewBox="0 0 24 24">
        <path d="M20.1 7.6a5.9 5.9 0 0 1-7.3 7.3l-5.4 5.4a2.6 2.6 0 0 1-3.7-3.7l5.4-5.4a5.9 5.9 0 0 1 7.3-7.3l-3.5 3.5 3.7 3.7 3.5-3.5ZM5.2 18.8a.6.6 0 1 0 .8-.8.6.6 0 0 0-.8.8Z" />
      </symbol>
      <symbol id="icon-history" viewBox="0 0 24 24">
        <path d="M12 4a8 8 0 1 1-7.4 5H2l3.8-4L9.6 9H6.8a6 6 0 1 0 1.7-2.2L7.1 5.4A8 8 0 0 1 12 4Zm1 4v4.2l3.4 2-.9 1.5-4.5-2.6V8h2Z" />
      </symbol>
    </svg>

    <div class="app-shell">
      <aside class="sidebar" aria-label="会话信息">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">TD</div>
          <div>
            <p class="eyebrow">LangGraph Agent</p>
            <h1>技术文档研读助手</h1>
          </div>
        </div>

        <section class="panel">
          <div class="panel-heading">
            <h2>会话</h2>
            <button class="icon-button" id="copySessionButton" type="button" title="复制会话 ID" aria-label="复制会话 ID">
              <svg><use href="#icon-copy"></use></svg>
            </button>
          </div>
          <label class="field-label" for="sessionInput">Session ID</label>
          <div class="session-row">
            <input id="sessionInput" autocomplete="off" spellcheck="false" />
            <button class="icon-button" id="newSessionButton" type="button" title="新会话" aria-label="新会话">
              <svg><use href="#icon-plus"></use></svg>
            </button>
          </div>
          <div class="mini-actions">
            <button class="text-button" id="reloadHistoryButton" type="button">
              <svg><use href="#icon-refresh"></use></svg>
              刷新历史
            </button>
            <label class="toggle">
              <input id="includeToolsToggle" type="checkbox" />
              <span>显示工具结果</span>
            </label>
          </div>
        </section>

        <section class="panel status-panel">
          <div class="panel-heading">
            <h2>状态</h2>
            <span class="status-dot" id="statusDot" aria-hidden="true"></span>
          </div>
          <dl class="state-grid">
            <div>
              <dt>Agent</dt>
              <dd id="currentAgent">primary</dd>
            </div>
            <div>
              <dt>消息</dt>
              <dd id="messageCount">0</dd>
            </div>
            <div>
              <dt>目标</dt>
              <dd id="learningTarget">-</dd>
            </div>
            <div>
              <dt>审批</dt>
              <dd id="pendingState">无</dd>
            </div>
          </dl>
        </section>

        <section class="panel plan-panel">
          <div class="panel-heading">
            <h2>计划</h2>
            <span id="planProgress">0/0</span>
          </div>
          <ol id="planList" class="plan-list"></ol>
        </section>

        <section class="diagram-panel" aria-label="系统架构">
          <img src="/graphs/tech_doc_reader_agent_architecture.svg" alt="Multi-agent technical document reader architecture" />
        </section>
      </aside>

      <main class="workspace" aria-label="对话">
        <header class="topbar">
          <div>
            <p class="eyebrow">Workspace</p>
            <h2 id="workspaceTitle">当前会话</h2>
          </div>
          <div class="topbar-actions">
            <span class="run-state" id="runState">就绪</span>
            <button class="text-button" id="topReloadButton" type="button">
              <svg><use href="#icon-history"></use></svg>
              历史
            </button>
          </div>
        </header>

        <section class="messages" id="messages" aria-live="polite"></section>

        <section class="approval hidden" id="approvalBox" aria-live="assertive">
          <div>
            <p class="approval-title">需要确认敏感操作</p>
            <p class="approval-copy">请确认是否允许 agent 继续执行当前工具调用。</p>
          </div>
          <textarea id="approvalFeedback" rows="2" placeholder="拒绝时可填写修改意见"></textarea>
          <div class="approval-actions">
            <button class="text-button danger" id="rejectButton" type="button">
              <svg><use href="#icon-x"></use></svg>
              拒绝
            </button>
            <button class="primary-button" id="approveButton" type="button">
              <svg><use href="#icon-check"></use></svg>
              批准
            </button>
          </div>
        </section>

        <form class="composer" id="composer">
          <textarea id="messageInput" rows="1" placeholder="输入文档链接、技术主题或你的问题..." autocomplete="off"></textarea>
          <button class="send-button" id="sendButton" type="submit" title="发送" aria-label="发送">
            <svg><use href="#icon-send"></use></svg>
          </button>
        </form>
      </main>

      <aside class="activity" aria-label="工具活动">
        <div class="activity-heading">
          <div>
            <p class="eyebrow">Trace</p>
            <h2>工具活动</h2>
          </div>
          <button class="icon-button" id="clearActivityButton" type="button" title="清空工具活动" aria-label="清空工具活动">
            <svg><use href="#icon-x"></use></svg>
          </button>
        </div>
        <div id="activityList" class="activity-list"></div>
      </aside>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
